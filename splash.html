<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineFind | Splash</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/splash.js" defer></script>
  </head>
  <body class="splash-page">
    <main class="splash-shell">
      <section class="splash-card" aria-label="CineFind splash screen">
        <div class="splash-orbit"></div>
        <div class="splash-smoke splash-smoke-left"></div>
        <div class="splash-smoke splash-smoke-right"></div>

        <div class="splash-brand">
          <img src="assets/logo.png" alt="CineFind logo" class="splash-logo" />
          <h1 class="brand-wordmark" aria-label="CineFind">
            <span>CINE</span><span>FIND</span>
          </h1>
          <p class="splash-tagline">Find. Watch. Enjoy.</p>
        </div>

        <div class="loading-wrap" aria-label="Loading movies">
          <div class="loading-track">
            <span class="loading-progress"></span>
          </div>
          <p class="loading-label">Loading movies...</p>
        </div>
      </section>
    </main>
  </body>
</html>
