<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineFind | Watchlist</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/watchlist.js" defer></script>
  </head>
  <body class="app-page">
    <div class="app-shell app-shell-home">
      <header class="app-header">
        <a href="menu.html" class="header-icon-btn" aria-label="Open menu">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7H20"></path>
            <path d="M4 12H20"></path>
            <path d="M4 17H20"></path>
          </svg>
        </a>
        <h1 class="brand-title">CINE<span>FIND</span></h1>
        <a href="profile.html" class="header-icon-btn profile-header-btn" aria-label="Open profile">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="3.5"></circle>
            <path d="M5.5 19.5C6.9 16.8 9.1 15.5 12 15.5C14.9 15.5 17.1 16.8 18.5 19.5"></path>
          </svg>
        </a>
      </header>

      <main class="app-body app-body-scroll">
        <section class="page-intro">
          <p class="eyebrow">Saved Movies</p>
          <h2 class="results-title">Your Watchlist</h2>
          <p class="page-subtitle">Movies saved from Home or Trending will appear here.</p>
        </section>

        <div class="feedback-box" data-watchlist-empty>
          <div class="feedback-icon">★</div>
          <h3>Your watchlist is empty</h3>
          <p>Save movies from Home or Trending and they will show up here instantly.</p>
        </div>

        <section class="watchlist-grid movie-grid" data-watchlist-grid></section>
      </main>

      <nav class="bottom-nav" aria-label="Bottom navigation">
        <a href="home.html" class="nav-item">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 10.5L12 4L20 10.5"></path>
              <path d="M6.5 9.5V20H17.5V9.5"></path>
            </svg>
          </span>
          <span>Home</span>
        </a>
        <a href="trending.html" class="nav-item">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M13 3C13 6.8 15.2 8.9 18.8 9C18.1 15 14 19 9 19C5.7 19 3 16.3 3 13C3 9.1 6.1 6 10 6C11 6 12 6.2 13 6.7"></path>
            </svg>
          </span>
          <span>Trending</span>
        </a>
        <a href="watchlist.html" class="nav-item active">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 4.5H17C17.6 4.5 18 4.9 18 5.5V20L12 16L6 20V5.5C6 4.9 6.4 4.5 7 4.5Z"></path>
            </svg>
          </span>
          <span>Watchlist</span>
        </a>
        <a href="menu.html" class="nav-item">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7H20"></path>
              <path d="M4 12H20"></path>
              <path d="M4 17H20"></path>
            </svg>
          </span>
          <span>Menu</span>
        </a>
      </nav>
    </div>
  </body>
</html>
