<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineFind | Profile</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/profile.js" defer></script>
  </head>
  <body class="app-page">
    <div class="app-shell app-shell-home">
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <span class="status-bar-signal"><i></i><i></i><i></i></span>
          <span class="status-wifi"></span>
          <span class="status-battery"></span>
        </div>
      </div>

      <header class="page-header">
        <a href="menu.html" class="back-btn" aria-label="Back to menu">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14.5 5L7.5 12L14.5 19"></path>
            <path d="M8 12H20"></path>
          </svg>
        </a>
        <h1 class="page-title">Profile</h1>
        <span></span>
      </header>

      <main class="app-body app-body-scroll">
        <section class="profile-card">
          <div class="avatar-wrapper">
            <div class="avatar-placeholder" data-avatar-placeholder>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M5 19C6.5 16.5 8.9 15.2 12 15.2C15.1 15.2 17.5 16.5 19 19"></path>
              </svg>
            </div>
            <img src="" alt="Profile preview" class="avatar-img" data-avatar-image hidden />
            <button type="button" class="edit-avatar-btn" data-edit-avatar aria-label="Change avatar">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 21L8 20L18.8 9.2A2.2 2.2 0 0 0 15.8 6.2L5 17L3 21Z"></path>
                <path d="M14.5 7.5L17.5 10.5"></path>
              </svg>
            </button>
            <input type="file" accept="image/*" data-avatar-input hidden />
          </div>

          <div class="profile-heading">
            <h2>Your Profile</h2>
            <p>Update your information</p>
          </div>

          <form data-profile-form>
            <div class="form-group">
              <label for="profile-name">Full Name</label>
              <div class="form-input-wrap">
                <span class="form-input-icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="8" r="3.5"></circle>
                    <path d="M5.5 19.5C6.9 16.8 9.1 15.5 12 15.5C14.9 15.5 17.1 16.8 18.5 19.5"></path>
                  </svg>
                </span>
                <input id="profile-name" class="form-input" type="text" data-profile-name placeholder="John Doe" />
              </div>
            </div>

            <div class="form-group">
              <label for="profile-email">Email Address</label>
              <div class="form-input-wrap">
                <span class="form-input-icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 6.5H20V17.5H4Z"></path>
                    <path d="M4.5 7L12 13L19.5 7"></path>
                  </svg>
                </span>
                <input
                  id="profile-email"
                  class="form-input"
                  type="email"
                  data-profile-email
                  placeholder="john.doe@email.com"
                />
              </div>
            </div>

            <div class="button-stack">
              <button type="submit" class="primary-btn">
                <span class="button-icon-label">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 4.5H16L19 7.5V19.5H5Z"></path>
                    <path d="M8 4.5V10H15V4.5"></path>
                    <path d="M9 19V13.5H15V19"></path>
                  </svg>
                  <span>Save Profile</span>
                </span>
              </button>
              <button type="button" class="secondary-btn" data-reset-profile>
                <span class="button-icon-label">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 11V5H10"></path>
                    <path d="M5 6C6.8 4.2 9.2 3 12 3C17 3 21 7 21 12C21 17 17 21 12 21C7.8 21 4.2 18.2 3.3 14.3"></path>
                  </svg>
                  <span>Reset</span>
                </span>
              </button>
            </div>
          </form>
        </section>

        <div class="success-message" data-profile-success>
          <span class="message-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M8 12.5L10.8 15.2L16 9.8"></path>
            </svg>
          </span>
          <span data-profile-success-text>Profile updated successfully</span>
        </div>

        <div class="error-message" data-profile-error></div>
      </main>

      <nav class="bottom-nav" aria-label="Bottom navigation">
        <a href="home.html" class="nav-item">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 10.5L12 4L20 10.5"></path>
              <path d="M6.5 9.5V20H17.5V9.5"></path>
            </svg>
          </span>
          <span>Home</span>
        </a>
        <a href="trending.html" class="nav-item">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M13 3C13 6.8 15.2 8.9 18.8 9C18.1 15 14 19 9 19C5.7 19 3 16.3 3 13C3 9.1 6.1 6 10 6C11 6 12 6.2 13 6.7"></path>
            </svg>
          </span>
          <span>Trending</span>
        </a>
        <a href="watchlist.html" class="nav-item">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 4.5H17C17.6 4.5 18 4.9 18 5.5V20L12 16L6 20V5.5C6 4.9 6.4 4.5 7 4.5Z"></path>
            </svg>
          </span>
          <span>Watchlist</span>
        </a>
        <a href="menu.html" class="nav-item active">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7H20"></path>
              <path d="M4 12H20"></path>
              <path d="M4 17H20"></path>
            </svg>
          </span>
          <span>Menu</span>
        </a>
      </nav>
    </div>
  </body>
</html>
